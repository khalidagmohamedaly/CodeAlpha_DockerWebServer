name: CI - Build & Test Docker Web Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t codealpha-webserver:ci .

      - name: Lancer le conteneur
        run: docker run -d --name webserver_test -p 3000:3000 codealpha-webserver:ci

      - name: Attendre que le conteneur soit prêt
        run: sleep 5

      - name: Vérifier le health check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$status" -ne 200 ]; then
            echo "Health check a échoué (status $status)"
            docker logs webserver_test
            exit 1
          fi
          echo "Health check OK"

      - name: Nettoyer
        if: always()
        run: docker rm -f webserver_test || true
